<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Boost</title>
<style>
html {
    overflow-x: hidden;
}
body {
    margin: 0;
    padding: 0 0 20px 0;
    width: 100%;
    overflow-x: hidden;
    -webkit-box-sizing: border-box;
    box-sizing: border-box;
    font: 15px -apple-system, 'Helvetica Neue', sans-serif;
    background: #c8ccd1;
    -webkit-user-select: none;
}
.icon {
    display: block;
    margin: 16px auto 0 auto;
    width: 57px;
    height: 57px;
    border-radius: 12px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6), 0 3px 8px rgba(0,0,0,0.35);
    border: 1px solid rgba(0,0,0,0.15);
}
.card {
    margin: 18px auto 0 auto;
    max-width: 340px;
    -webkit-box-sizing: border-box;
    box-sizing: border-box;
    background: -webkit-gradient(linear, left top, left bottom, from(#ffffff), to(#fbfbfb));
    border: 1px solid #a8adb3;
    border-radius: 9px;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset, 0 1px 1px rgba(0,0,0,0.08);
}
.device-tag {
    display: block;
    text-align: center;
    padding: 7px 12px;
    font-size: 12px;
    color: #6b7076;
    background: -webkit-gradient(linear, left top, left bottom, from(#f4f5f6), to(#e9ebed));
    border-bottom: 1px solid #d3d6da;
    text-shadow: 0 1px 0 rgba(255,255,255,0.8);
}
.chart-wrap {
    padding: 12px 10px 6px 10px;
    text-align: center;
}
.chart-wrap svg {
    max-width: 100%;
    height: auto;
}
.stat-row {
    display: block;
    text-align: center;
    padding: 4px 0 14px 0;
    color: #6b7076;
    font-size: 12px;
}
.stat-row strong {
    font-size: 20px;
    display: block;
    line-height: 1.3;
}
.stat-row .green { color: #3d8b3d; text-shadow: 0 1px 0 rgba(255,255,255,0.5); }
.stat-row .red { color: #c62828; }
code {
    font-size: 12px;
    background: #eef0f2;
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid #d3d6da;
}
</style>
</head>
<body>

<img class="icon" src="icon.png" alt="">

<div class="card">
    <span class="device-tag">iPhone 4, iOS 6.1.3, 15 runs each</span>

    <div class="chart-wrap">
<svg viewBox="0 0 300 200" width="300" height="200" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="jitGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#66bb6a"/>
<stop offset="100%" stop-color="#388e3c"/>
</linearGradient>
<linearGradient id="noGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#ef5350"/>
<stop offset="100%" stop-color="#c62828"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="300" height="200" fill="#fafafa" rx="4"/>

<line x1="40" y1="170" x2="280" y2="170" stroke="#bbb" stroke-width="1"/>
<text x="8" y="173" font-size="8" fill="#999">0s</text>
<text x="8" y="130" font-size="8" fill="#999">15s</text>
<text x="8" y="85" font-size="8" fill="#999">30s</text>
<line x1="40" y1="130" x2="280" y2="130" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="2,3"/>
<line x1="40" y1="85" x2="280" y2="85" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="2,3"/>

<rect x="55" y="130" width="80" height="40" rx="3" fill="url(#jitGrad)"/>
<text x="95" y="124" font-size="11" fill="#1b5e20" font-weight="bold" text-anchor="middle">15.2s</text>
<text x="95" y="155" font-size="9" fill="#fff" font-weight="bold" text-anchor="middle">JIT</text>

<rect x="165" y="65" width="80" height="105" rx="3" fill="url(#noGrad)"/>
<text x="205" y="59" font-size="11" fill="#b71c1c" font-weight="bold" text-anchor="middle">39.4s</text>
<text x="205" y="155" font-size="9" fill="#fff" font-weight="bold" text-anchor="middle">No JIT</text>

<text x="150" y="195" font-size="8" fill="#bbb" text-anchor="middle">Benchmark time (lower is better)</text>
</svg>
    </div>

    <span class="stat-row">
        <strong class="green">2.6x faster</strong>
        with Boost
    </span>
</div>

</body>
</html>
