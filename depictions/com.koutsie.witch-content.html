        <div class="panel" id="changelog"><h2 style="margin: 15px 20px 10px 20px; font-size: 16px; color: #333;">Changelog</h2><div class="row"><p style="margin: 0;"><strong>v1.1.71:</strong> <span style="color: #999; font-weight: normal;">(Jul 24, 2026)</span> fixed hls streams</p></div><a href="com.koutsie.witch-changelog.html" class="view-all-changes">view all changes &rsaquo;</a></div>

        </div>

    <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
        <img src="" alt="" id="lightboxImg">
    </div>
    <script>
        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightboxOverlay').style.display = 'block';
        }
        function closeLightbox() {
            document.getElementById('lightboxOverlay').style.display = 'none';
        }
        if (navigator.userAgent.indexOf('Cydia') === -1) {
            document.getElementById('browser-download').style.display = 'block';
        }
        var benchNote = document.getElementById('benchNote');
        if (benchNote) {
            var ua = navigator.userAgent;
            var isSafari = ua.indexOf('Safari') !== -1
                && ua.indexOf('Version/') !== -1
                && ua.indexOf('Cydia') === -1
                && ua.indexOf('Chrome') === -1
                && ua.indexOf('CriOS') === -1
                && ua.indexOf('FxiOS') === -1
                && ua.indexOf('OPiOS') === -1
                && ua.indexOf('OPR') === -1
                && ua.indexOf('Edg') === -1;
            if (isSafari) {
                benchNote.style.display = 'block';
            }
        }
        var fwMin = "6.1.3";
        var fwMax = "10.3.3";
        if (fwMin || fwMax) {
            var ua = navigator.userAgent;
            var m = ua.match(/OS (\d+)_(\d+)(?:_(\d+))?/);
            if (m) {
                var deviceVer = [parseInt(m[1], 10), parseInt(m[2], 10), parseInt(m[3] || 0, 10)];
                var parseBound = function (s) {
                    var parts = s.split('.');
                    var out = [];
                    var i;
                    for (i = 0; i < 3; i++) {
                        out.push(parseInt(parts[i] || 0, 10));
                    }
                    return out;
                };
                var cmp = function (a, b) {
                    var i;
                    for (i = 0; i < 3; i++) {
                        if (a[i] !== b[i]) {
                            return a[i] - b[i];
                        }
                    }
                    return 0;
                };
                var ok = true;
                if (fwMin && cmp(deviceVer, parseBound(fwMin)) < 0) {
                    ok = false;
                }
                if (fwMax && cmp(deviceVer, parseBound(fwMax)) > 0) {
                    ok = false;
                }
                var panel = document.getElementById('compatPanel');
                var row = document.getElementById('compatRow');
                row.className = 'row compat-row ' + (ok ? 'compat-yes' : 'compat-no');
                row.innerHTML = ok ? 'Your device is compatible!' : 'Your device may not be compatible.';
                panel.style.display = 'block';
            }
        }
        var lc = document.getElementById('libreCounterImg');
        if (lc) {
            var iosVer = navigator.userAgent.match(/OS (\d+)_/);
            if (iosVer && parseInt(iosVer[1], 10) < 11) {
                lc.width = 0;
                lc.height = 0;
            }
        }
    </script>
</body>
