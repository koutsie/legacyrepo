<!DOCTYPE html>
<html>
<head>
    <title>404 - Not Found</title>
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" type="text/css" href="/style.css">
    <style>
        .error-code {
            font-size: 72px;
            font-weight: bold;
            color: #999;
            text-shadow: 0px 1px 0px rgba(255,255,255,0.8);
            text-align: center;
            margin: 40px 0 20px 0;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Not Found</h1>
    </div>
    <div class="content">
        <div class="error-code">404</div>
        <div class="panel">
            <div class="row">
                <div class="info" style="text-align: center; width: 100%;">
                    <h2 style="font-size: 20px; margin-bottom: 5px;">Package Not Found</h2>
                    <p style="margin: 0; color: #666;">The resource you requested is missing or has been removed from koutsie's repo.</p>
                </div>
            </div>
            <a href="/" class="button">Return Home</a>
        </div>
        <div class="counter-row">
            <a href="https://librecounter.org/referer/show" target="_blank">
                <img src="https://librecounter.org/solid-orange.svg" referrerPolicy="unsafe-url" id="libreCounterImg">
            </a>
        </div>
        <div class="fedi-row">
            Like my work?<br>
            <a href="https://layer8.space/@k" class="fedi-link"><img src="fedi-icon.png" alt="">fedi</a>!
        </div>
    </div>
</body>
</html>
